<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumpleaños Mi Niña</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff9ece, #ff69b4, #ff99cc);
      font-family: 'Arial', sans-serif;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3.8rem;
      margin: 30px 0 10px 0;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 2.9rem;
      font-weight: bold;
      margin-bottom: 50px;
      text-shadow: 4px 4px 12px rgba(0, 0, 0, 0.4);
      color: #fff;
    }

    /* Decoraciones flotantes */
    .decorations {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .balloon {
      position: absolute;
      font-size: 3.2rem;
      animation: float 14s linear infinite;
      opacity: 0.95;
    }

    .heart {
      position: absolute;
      font-size: 2.8rem;
      color: #ff3388;
      animation: float 11s linear infinite;
      text-shadow: 0 0 12px #ff69b4;
    }

    @keyframes float {
      0% { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(360deg); }
    }

    /* Marco principal grande - más bonito */
    .main-frame {
      width: 560px;
      height: 560px;
      margin: 0 auto 70px auto;
      padding: 25px;
      background: linear-gradient(145deg, #ffffff, #ffe6f2);
      border-radius: 40px;
      box-shadow: 0 20px 40px rgba(255, 105, 180, 0.5),
                  inset 0 0 30px rgba(255, 182, 193, 0.6);
      position: relative;
      z-index: 3;
      border: 12px solid #fff;
    }

    .main-frame::before {
      content: '';
      position: absolute;
      top: -15px;
      left: -15px;
      right: -15px;
      bottom: -15px;
      border: 8px solid #ff99cc;
      border-radius: 45px;
      z-index: -1;
      opacity: 0.7;
    }

    .main-photo {
      width: 100%;
      height: 100%;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .main-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .main-photo img:hover {
      transform: scale(1.05);
    }

    /* Marcos pequeños más elegantes */
    .small-photos {
      display: flex;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
      margin-top: 30px;
      position: relative;
      z-index: 3;
    }

    .small-frame {
      width: 300px;
      height: 300px;
      padding: 18px;
      background: linear-gradient(145deg, #ffffff, #ffe0f0);
      border-radius: 35px;
      box-shadow: 0 15px 30px rgba(255, 105, 180, 0.45),
                  inset 0 0 25px rgba(255, 182, 193, 0.5);
      border: 10px solid #fff;
      position: relative;
    }

    .small-frame::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -12px;
      right: -12px;
      bottom: -12px;
      border: 6px solid #ff99cc;
      border-radius: 40px;
      z-index: -1;
      opacity: 0.75;
    }

    .small-photo {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .small-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .small-photo img:hover {
      transform: scale(1.08);
    }

    .placeholder {
      width: 100%;
      height: 100%;
      background: #fff0f7;
      border: 6px dashed #ff69b4;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff4da6;
      font-size: 1.25rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="decorations" id="decorations"></div>

  <div class="container">
    <h1>🎀 FELIZ CUMPLEAÑOS MI NIÑA 🎀</h1>
    <p class="subtitle">FELIZ CUMPLEAÑOS NÚMERO 18 MI REYNA 👑</p>

    <!-- Marco principal -->
    <div class="main-frame">
      <div class="main-photo">
        <img src="pLSCl (1).jpg" alt="Foto principal">
      </div>
    </div>

    <!-- Dos fotos pequeñas con casas bonitas -->
    <div class="small-photos">
      <div class="small-frame">
        <div class="small-photo">
          <img src="WhatsApp Image 2026-04-07 at 2.33.26 AM (1).jpeg" alt="Casa bonita 1">
        </div>
      </div>
      
      <div class="small-frame">
        <div class="small-photo">
          <img src="WhatsApp-Video-2026-04-07-at-2.33.29-AM (1).gif" alt="Casa bonita 2">
        </div>
      </div>
    </div>
  </div>

  <script>
    function createDecorations() {
      const container = document.getElementById('decorations');
      
      const emojis = ['🎈', '🎉', '💖', '💗', '🌸', '🦩', '💕'];
      
      for (let i = 0; i < 30; i++) {
        const item = document.createElement('div');
        item.className = Math.random() > 0.5 ? 'balloon' : 'heart';
        item.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        item.style.left = Math.random() * 100 + 'vw';
        item.style.animationDuration = (Math.random() * 12 + 10) + 's';
        item.style.animationDelay = '-' + (Math.random() * 20) + 's';
        item.style.opacity = Math.random() * 0.4 + 0.7;
        container.appendChild(item);
      }
    }

    window.onload = createDecorations;
  </script>
</body>
</html>
